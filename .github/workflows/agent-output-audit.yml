name: agent-output-audit

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.py'
      - '**/*.sql'
      - '**/*.json'
      - '**/*.sh'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.py'
      - '**/*.sql'
      - '**/*.json'
      - '**/*.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Determine changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
          else
            BASE=""
          fi

          if [ -n "$BASE" ] && git cat-file -e "$BASE" 2>/dev/null; then
            ALL_CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE" HEAD | grep -vE '^\.(github/|kiro/)' | grep -vE '^(AGENTS\.md|CONTRIBUTING)' || true)
          else
            ALL_CHANGED=$(git ls-files -- '*.md' '*.yaml' '*.yml' '*.py' '*.sql' '*.json' '*.sh' | grep -vE '^\.(github/|kiro/)' | grep -vE '^(AGENTS\.md|CONTRIBUTING)' || true)
          fi

          MD_FILES=$(echo "$ALL_CHANGED" | grep -E '\.md$' || true)
          TEXT_FILES=$(echo "$ALL_CHANGED" | grep -E '\.(md|yaml|yml|py|sql|json|sh)$' || true)

          # Write to files for subsequent steps
          echo "$MD_FILES" > /tmp/changed_md.txt
          echo "$TEXT_FILES" > /tmp/changed_text.txt

          MD_COUNT=$(echo "$MD_FILES" | grep -c . || echo 0)
          TEXT_COUNT=$(echo "$TEXT_FILES" | grep -c . || echo 0)
          echo "md_count=$MD_COUNT" >> "$GITHUB_OUTPUT"
          echo "text_count=$TEXT_COUNT" >> "$GITHUB_OUTPUT"

      - name: Naming check (changed .md only)
        if: steps.changed.outputs.md_count != '0'
        run: |
          EXITCODE=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue
            # Exclude lines with allow:naming comment
            if grep -nE '\bFSxN\b|FSx ONTAP|FSx S3 AP' "$f" | grep -v 'allow:naming'; then
              echo "::error file=$f::Naming violation found"
              EXITCODE=1
            fi
          done < /tmp/changed_md.txt
          exit $EXITCODE

      - name: Forbidden tools check (changed .md only)
        if: steps.changed.outputs.md_count != '0'
        run: |
          EXITCODE=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue
            if grep -nE 'Workload Factory|NetApp Console|BlueXP' "$f"; then
              echo "::error file=$f::Forbidden tool reference found"
              EXITCODE=1
            fi
          done < /tmp/changed_md.txt
          exit $EXITCODE

      - name: Vendor neutrality check (changed .md only)
        if: steps.changed.outputs.md_count != '0'
        run: |
          EXITCODE=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue
            if grep -nEi '最強|game-changer|ゲームチェンジャー|競合ツール|優位性|より優れ|is better than|is superior to' "$f"; then
              echo "::error file=$f::Vendor neutrality violation found"
              EXITCODE=1
            fi
          done < /tmp/changed_md.txt
          exit $EXITCODE

      - name: Leak check (changed text files)
        if: steps.changed.outputs.text_count != '0'
        env:
          PROJECT_CONTEXT_NAMES: ${{ secrets.PROJECT_CONTEXT_NAMES }}
        run: |
          PATTERN='DB-I-[0-9]+'
          if [ -n "$PROJECT_CONTEXT_NAMES" ]; then
            PATTERN="$PROJECT_CONTEXT_NAMES|$PATTERN"
          fi

          EXITCODE=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue
            # Output file:line only, never the match content
            HITS=$(grep -nE "$PATTERN" "$f" | cut -d: -f1,2 || true)
            if [ -n "$HITS" ]; then
              echo "$HITS" | while IFS= read -r loc; do
                echo "::error file=${f},line=${loc##*:}::Potential leak detected"
              done
              EXITCODE=1
            fi
          done < /tmp/changed_text.txt
          exit $EXITCODE

      - name: JA/EN parity warning (changed ja docs)
        if: steps.changed.outputs.md_count != '0'
        run: |
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue
            # Check if file is in a ja path and has an en counterpart
            EN_FILE=$(echo "$f" | sed 's|/ja/|/en/|')
            if echo "$f" | grep -q '/ja/' && [ -f "$EN_FILE" ]; then
              JA_SECTIONS=$(grep -c '^##' "$f" || echo 0)
              EN_SECTIONS=$(grep -c '^##' "$EN_FILE" || echo 0)
              if [ "$JA_SECTIONS" != "$EN_SECTIONS" ]; then
                echo "::warning file=$f::JA/EN section count mismatch (JA=$JA_SECTIONS, EN=$EN_SECTIONS)"
              fi
            fi
          done < /tmp/changed_md.txt
