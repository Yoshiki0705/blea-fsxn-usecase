name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npx eslint "usecases/**/*.ts" "shared/**/*.ts" --max-warnings 50

      - name: Format check (prettier)
        run: npx prettier --check "usecases/**/*.ts" "shared/**/*.ts"

      - name: Check for hardcoded secrets or personal info
        run: |
          echo "Checking for real AWS account IDs..."
          if grep -rn "178625946981\|351389403887" usecases/ shared/ --include="*.ts" | grep -v node_modules | grep -v cdk.out; then
            echo "::error::Real AWS account ID found in source files"
            exit 1
          fi
          echo "Checking for personal email addresses..."
          if grep -rn "@gmail.com\|@netapp.com\|@amazon.com" usecases/ shared/ --include="*.ts" | grep -v node_modules | grep -v cdk.out | grep -v "example.com"; then
            echo "::error::Personal email address found in source files"
            exit 1
          fi
          echo "✅ No secrets or personal info found"

      - name: Test
        run: npm test

      - name: CDK Synth (Spec A)
        run: npx cdk synth --quiet
        working-directory: usecases/blea-guest-fsxn-data-analytics-sample

      - name: CDK Synth (Spec B)
        run: npx cdk synth --quiet
        working-directory: usecases/guest-fsxn-cyber-resilience-sample

      - name: CDK Synth (Spec G)
        run: npx cdk synth --quiet
        working-directory: usecases/blea-guest-fsxn-flexcache-sample

      - name: CDK Synth (Spec H)
        run: npx cdk synth --quiet
        working-directory: usecases/blea-guest-fsxn-modernization-sample
